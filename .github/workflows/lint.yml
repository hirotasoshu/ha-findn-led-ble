name: "Lint"

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  lint:
    name: "Lint & Type Check"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@v6.0.2"

      - name: "Install uv"
        uses: "astral-sh/setup-uv@v6"
        with:
          python-version: "3.14.3"
          enable-cache: true

      - name: "Install dependencies"
        run: uv sync

      - name: "Lint & Type Check"
        run: make lint
